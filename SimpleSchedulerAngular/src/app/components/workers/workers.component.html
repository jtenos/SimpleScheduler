<h2>Workers {{ active ? "" : "(inactive)" }}</h2>

<div *ngIf="loading">Loading...</div>

<div class="card shadow" style="width: 100%; margin-bottom: 10px; margin-top: 20px;" *ngIf="!loading">
    <div class=form-group style="display: flex; justify-content: space-around;">
        <div>
            <label style=visibility:hidden;>Refresh</label>
            <button mat-raised-button color="primary" (click)="refresh()">Refresh</button>
        </div>
        <div>
            <mat-form-field>
                <mat-label>Filter...</mat-label>
                <input matInput type=text #filterWorkerName autofocus (keyup)="doFilter(filterWorkerName.value)">
                <button mat-button *ngIf="filterWorkerName.value" matSuffix mat-icon-button aria-label="Clear"
                    (click)="filterWorkerName.value=''">
                    <mat-icon>close</mat-icon>
                </button>
            </mat-form-field>
        </div>
        <div>
            <button mat-stroked-button color="primary" (click)="toggleActive()"
                >{{ active ? "Show Inactive" : "Show Active" }}</button>
        </div>
        <div>
            <button mat-raised-button color=primary routerLink="edit/0">Create</button>
        </div>
    </div>
    <div class="card-body">

        <app-worker-table [workerDetails]="workerDetails" [active]="active" (refreshWorkers)="refreshWorkers()"
            [filterWorkerName]="filterWorkerName.value"></app-worker-table>
    </div>
</div>
