<div *ngIf="loading">Loading...</div>

<!-- TODO: Make this fancy -->
<div>{{message}}</div>

<div style="display: flex; justify-content: center; align-items: center;">
    <mat-card>
        <form class="login-form" *ngIf="(!loading && !submitting && !submitted)" (ngSubmit)="onSubmit()">
            <mat-form-field style=width:100%;>
                <mat-label>Email Address</mat-label>
                <input type="email" matInput [formControl]=emailFormControl [errorStateMatcher]="matcher"
                    placeholder="Ex. hello@example.com">
                <mat-error *ngIf="emailFormControl.hasError('required')">
                    Email is <strong>required</strong>
                </mat-error>
            </mat-form-field>
            <div>
                <button mat-raised-button color="primary" type=submit>Submit</button>
            </div>
        </form>
    </mat-card>
</div>

<div *ngIf="submitting">Submitting - please wait...</div>

<div *ngIf="submitted">Please check your email for a login link.</div>
